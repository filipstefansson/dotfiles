# Self-hosted GitHub Actions runners for this machine, read by agent.sh.
#
# One runner per line:  <name>  <scope-url>  <labels-csv>
#   name   — local dir under ~/runners/<name> + part of the runner's GitHub name
#   scope  — https://github.com/<org>            (org-level: covers ALL its repos)
#            https://github.com/<owner>/<repo>   (repo-level: that repo only)
#   labels — comma-separated, no spaces; workflows target these via `runs-on`
#
# Notes:
#   - User accounts have no account-wide runner level, so personal repos each
#     need their own repo-level line. An org needs only one org-level line.
#   - Each running runner = 1 concurrent job. Keep this list short (~2 lines)
#     to stay near the intended 1-2 parallel jobs on this old machine.
#   - Re-running agent.sh skips already-configured runners, so adding a repo
#     is just a new line + re-run.
#   - gh must be authed with admin scope on the org/repo (tokens are minted
#     automatically; nothing is stored here).
#
# TODO(future): containerized non-iOS jobs should go to a SEPARATE Linux runner,
# not this Mac (macOS can't run container jobs / Xcode in Docker).

# name          scope                                      labels
# org-acme      https://github.com/acme                    self-hosted,macos,agent
# my-game       https://github.com/filipstefansson/my-game self-hosted,macos,agent,bevy
